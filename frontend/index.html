<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PLM AI Agent — 企业级多智能体选品平台 v3.1</title>
<style>
:root{--bg:#f0f4ff;--bg2:#fff;--bg3:#e8f0fe;--border:#d2e0f5;--text:#1a1a2e;--text2:#5a6d8a;--blue:#2563eb;--green:#059669;--orange:#d97706;--purple:#7c3aed;--red:#dc2626;--cyan:#0891b2;--font:system-ui,-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;overflow:hidden}
a{color:var(--blue);text-decoration:none}

/* Login */
.login-page{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 50%,#60a5fa 100%)}
.login-box{background:#fff;border-radius:20px;padding:48px;width:440px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.login-box h1{font-size:28px;color:#1e3a5f;margin-bottom:4px}
.login-box .sub{color:var(--text2);margin-bottom:24px;font-size:14px}
.login-box .roles{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.role-card{padding:12px;border:2px solid var(--border);border-radius:10px;cursor:pointer;text-align:center;transition:all .2s}
.role-card:hover{border-color:var(--blue);background:var(--bg)}
.role-card.selected{border-color:var(--blue);background:#eff6ff}
.role-card .icon{font-size:28px;display:block;margin-bottom:4px}
.role-card .name{font-size:13px;font-weight:600;color:var(--text)}
.role-card .desc{font-size:10px;color:var(--text2)}
.login-box input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:10px;font-size:14px;margin-bottom:16px;font-family:var(--font);color:var(--text);background:var(--bg)}
.login-box input:focus{outline:none;border-color:var(--blue)}
.login-box .btn-login{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s}
.login-box .btn-login:hover{background:#1d4ed8;transform:translateY(-1px)}

/* App Layout */
.app{display:none;height:100vh;grid-template-columns:240px 1fr}
.app.active{display:grid}
.sidebar{background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-logo{padding:20px;border-bottom:1px solid var(--border)}
.sidebar-logo h2{font-size:16px;color:var(--blue)}.sidebar-logo span{font-size:11px;color:var(--text2)}
.sidebar-nav{flex:1;padding:12px}
.nav-s{padding:12px 14px 6px;font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:8px;color:var(--text2);cursor:pointer;font-size:13px;margin-bottom:2px;transition:all .15s}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--bg3);color:var(--blue);font-weight:600}
.nav-item .ico{font-size:16px;width:22px;text-align:center}
.nav-item .badge{background:var(--red);color:#fff;font-size:10px;padding:1px 7px;border-radius:10px;margin-left:auto}
.sidebar-footer{padding:16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.av{width:36px;height:36px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:14px}
.role-tag{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--bg3);color:var(--blue)}

/* Main content */
.main{overflow-y:auto;background:var(--bg)}
.main-content{padding:28px 32px;max-width:1200px}
.header-bar{padding:16px 32px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.header-bar h2{font-size:20px;color:var(--text);font-weight:700}.header-bar .path{font-size:12px;color:var(--text2)}

/* Story */
.story{background:linear-gradient(135deg,#eff6ff 0%,#dbeafe 100%);border:1px solid #bfdbfe;border-left:4px solid var(--blue);border-radius:12px;padding:16px 20px;margin-bottom:20px}
.story h4{font-size:14px;color:var(--blue);margin-bottom:4px}.story p{font-size:13px;color:var(--text2);line-height:1.6}
.story .sr{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.story .sn{background:var(--blue);color:#fff;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600}

/* Components */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px}
.stat .n{font-size:30px;font-weight:800;color:var(--blue)}.stat .l{font-size:12px;color:var(--text2);margin-top:4px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin:16px 0}
.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;transition:all .2s}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.card h4{font-size:15px;color:var(--text);margin-bottom:8px}.card .m{font-size:12px;color:var(--text2);margin:8px 0}
.card .tags{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.tag{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:600}
.tb{background:#dbeafe;color:var(--blue)}.tg{background:#d1fae5;color:var(--green)}.tp{background:#ede9fe;color:var(--purple)}.to{background:#fef3c7;color:var(--orange)}.tr{background:#fee2e2;color:var(--red)}
table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden}
th{background:#f8fafc;padding:10px 14px;text-align:left;font-size:12px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border)}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border)}tr:last-child td{border-bottom:none}tr:hover{background:var(--bg)}
.grid2{display:grid;grid-template-columns:380px 1fr;gap:20px}
.form-g{margin-bottom:14px}.form-g label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:600}
.form-g textarea,.form-g input,.form-g select{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);color:var(--text);background:#fff}
.form-g textarea:focus,input:focus,select:focus{outline:none;border-color:var(--blue)}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-p{background:var(--blue);color:#fff}.btn-p:hover{background:#1d4ed8}.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-o{background:transparent;border:2px solid var(--border);color:var(--text)}.btn-o:hover{border-color:var(--blue)}
.btn-g{background:var(--green);color:#fff}.btn-r{background:var(--red);color:#fff}
.btn-s{padding:5px 12px;font-size:11px}.btn-grp{display:flex;gap:8px}
.flow-list{display:flex;flex-direction:column;gap:8px}
.flow-step{display:flex;align-items:center;gap:14px;padding:14px 16px;background:#fff;border:1px solid var(--border);border-radius:10px}
.flow-step .num{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;min-width:34px;transition:all .3s}
.flow-step .info{flex:1}.flow-step .info h4{font-size:14px;color:var(--text)}.flow-step .info p{font-size:12px;color:var(--text2)}
.flow-step .st{font-size:11px;padding:4px 10px;border-radius:8px;font-weight:600}
.st-d{background:#d1fae5;color:var(--green)}.st-a{background:#dbeafe;color:var(--blue)}.st-w{background:#f1f5f9;color:var(--text2)}

/* Toast */
.toast{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast-item{padding:12px 20px;background:#fff;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.15);font-size:13px;display:flex;align-items:center;gap:10px;animation:slideIn .3s ease;max-width:360px}
.toast-item.success{border-left:4px solid var(--green)}.toast-item.error{border-left:4px solid var(--red)}.toast-item.info{border-left:4px solid var(--blue)}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}

/* Workflow */
.wf-full{display:grid;grid-template-columns:240px 1fr 260px;height:calc(100vh - 120px)}
.wf-p{background:#fff;border:1px solid var(--border);overflow-y:auto;padding:16px}
.wf-c{background:var(--bg);background-image:radial-gradient(var(--border) 1px,transparent 1px);background-size:24px 24px;position:relative;overflow:auto;min-height:400px}
.wf-node{position:absolute;background:#fff;border:2px solid var(--border);border-radius:12px;padding:14px 18px;min-width:160px;text-align:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.wf-node:hover{box-shadow:0 4px 16px rgba(0,0,0,.12)}.wf-node:active{cursor:grabbing}
.wf-node.pl{border-color:var(--blue)}.wf-node.tr{border-color:var(--purple)}.wf-node.dt{border-color:var(--cyan)}.wf-node.ds{border-color:var(--green)}.wf-node.sp{border-color:var(--orange)}.wf-node.sm{border-color:var(--text2)}
.wf-node .nt{font-size:13px;font-weight:600}.wf-node .ns{font-size:10px;color:var(--text2)}
.al{padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .2s}
.al:hover{border-color:var(--blue);background:#fff}.al .an{font-size:12px;font-weight:600}.al .ad{font-size:10px;color:var(--text2)}
.ar{display:flex;align-items:center;gap:12px;padding:14px;background:#fff;border:1px solid var(--border);border-radius:10px;margin-bottom:8px}
.ar .info{flex:1}.ar .info h4{font-size:14px}.ar .info p{font-size:12px;color:var(--text2)}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}.empty .icon{font-size:48px;margin-bottom:12px}
</style>
</head>
<body>

<!-- TOAST CONTAINER -->
<div class="toast" id="toastContainer"></div>

<!-- LOGIN -->
<div class="login-page active" id="loginPage">
<div class="login-box">
<h1>🏗️ PLM AI Agent</h1><p class="sub">企业级多智能体选品平台 v3.1</p>
<p style="font-size:13px;color:var(--text2);margin-bottom:12px;font-weight:600">选择登录角色</p>
<div class="roles">
<div class="role-card selected" data-role="designer" onclick="selectRole(this,'designer')"><span class="icon">🎨</span><span class="name">选品设计师</span><span class="desc">AI选品 · 款式设计</span></div>
<div class="role-card" data-role="supply" onclick="selectRole(this,'supply')"><span class="icon">📦</span><span class="name">供应链专员</span><span class="desc">成本审批 · 物料管理</span></div>
<div class="role-card" data-role="ops" onclick="selectRole(this,'ops')"><span class="icon">📊</span><span class="name">运营复盘专员</span><span class="desc">销售数据 · 复盘分析</span></div>
<div class="role-card" data-role="admin" onclick="selectRole(this,'admin')"><span class="icon">⚙️</span><span class="name">AI 管理员</span><span class="desc">工作流 · 系统配置</span></div></div>
<input type="text" id="loginUser" placeholder="用户名" value="马永">
<button class="btn-login" onclick="doLogin()">进入系统</button>
</div></div>

<!-- APP -->
<div class="app" id="appMain">
<div class="sidebar" id="sidebar"></div>
<div style="display:flex;flex-direction:column;overflow:hidden">
<div class="header-bar"><h2 id="pageTitle">仪表盘</h2><span class="path" id="pagePath">首页</span></div>
<div class="main" id="mainContent"></div>
</div></div>

<script>
// ========== STATE ==========
let cr='designer',cu='马永',cp='dashboard',designRunning=false,wfNodes=[];

// ========== TOAST ==========
function toast(msg,type='info'){const t=document.getElementById('toastContainer');const d=document.createElement('div');d.className='toast-item '+type;d.innerHTML=type==='success'?'✅ '+(type==='error'?'❌ ':'ℹ️ ')+msg;t.appendChild(d);setTimeout(()=>{d.style.animation='fadeOut .3s ease';setTimeout(()=>d.remove(),300)},3000)}

// ========== LOGIN ==========
function selectRole(el,role){document.querySelectorAll('.role-card').forEach(c=>c.classList.remove('selected'));el.classList.add('selected');cr=role}
function doLogin(){cu=document.getElementById('loginUser').value||'马永';document.getElementById('loginPage').classList.remove('active');document.getElementById('appMain').classList.add('active');buildSidebar();navTo('dashboard');toast('欢迎 '+cu+'，已以 '+roleNames[cr]+' 身份登录','success')}
function doLogout(){if(confirm('确定要退出登录吗？')){document.getElementById('appMain').classList.remove('active');document.getElementById('loginPage').classList.add('active');wfNodes=[]}}

// ========== SIDEBAR ==========
const roleNames={designer:'选品设计师',supply:'供应链专员',ops:'运营复盘专员',admin:'AI 管理员'};
const roleMenus={designer:{icon:'🎨',menus:[
{section:'选品工作台',items:[{id:'dashboard',icon:'📊',label:'工作台概览'},{id:'design',icon:'🎨',label:'AI 选品设计'},{id:'trends',icon:'🔍',label:'趋势研究'}]},
{section:'我的任务',items:[{id:'myTasks',icon:'📋',label:'我的选品任务'},{id:'reports',icon:'📝',label:'选品报告'}]}]},
supply:{icon:'📦',menus:[
{section:'审批中心',items:[{id:'dashboard',icon:'📊',label:'工作台概览'},{id:'costApproval',icon:'✅',label:'成本审批',badge:'3'}]},
{section:'物料管理',items:[{id:'material',icon:'🧵',label:'物料BOM管理'},{id:'factory',icon:'🏭',label:'工厂管理'}]},
{section:'协作',items:[{id:'reports',icon:'📝',label:'选品方案查看'}]}]},
ops:{icon:'📊',menus:[
{section:'数据中心',items:[{id:'dashboard',icon:'📊',label:'工作台概览'},{id:'salesData',icon:'📈',label:'销售数据看板'}]},
{section:'复盘',items:[{id:'review',icon:'🔬',label:'选品复盘'},{id:'reports',icon:'📝',label:'复盘报告'}]}]},
admin:{icon:'⚙️',menus:[
{section:'系统管理',items:[{id:'dashboard',icon:'📊',label:'系统概览'},{id:'workflow',icon:'⚙️',label:'工作流编排'},{id:'agentMonitor',icon:'🤖',label:'Agent 监控'}]},
{section:'配置',items:[{id:'mcpConfig',icon:'🔌',label:'MCP 工具配置'},{id:'settings',icon:'⚙️',label:'系统设置'},{id:'users',icon:'👥',label:'用户管理'}]}]}};
const pageNames={dashboard:'工作台概览',design:'AI选品设计',trends:'趋势研究',myTasks:'我的任务',reports:'选品报告',costApproval:'成本审批',material:'物料管理',factory:'工厂管理',salesData:'销售数据',review:'选品复盘',workflow:'工作流编排',agentMonitor:'Agent监控',mcpConfig:'MCP配置',settings:'系统设置',users:'用户管理'};

function buildSidebar(){const r=roleMenus[cr];document.getElementById('sidebar').innerHTML=`
<div class="sidebar-logo"><h2>🏗️ PLM AI Agent</h2><span>v3.1 · Multi-Agent 选品平台</span></div>
<div class="sidebar-nav">${r.menus.map(s=>`<div class="nav-s">${s.section}</div>${s.items.map(m=>`<div class="nav-item" data-p="${m.id}" onclick="navTo('${m.id}',this)"><span class="ico">${m.icon}</span>${m.label}${m.badge?`<span class="badge">${m.badge}</span>`:''}</div>`).join('')}`).join('')}</div>
<div class="sidebar-footer"><div class="av">马</div><div><div style="font-size:13px;font-weight:600">${cu}</div><span class="role-tag">${r.icon} ${roleNames[cr]}</span></div><span style="cursor:pointer;font-size:12px;color:var(--text2);margin-left:auto" onclick="doLogout()">↩ 切换</span></div>`}

// ========== NAVIGATION ==========
function navTo(page,el){if(cp===page)return;cp=page;wfNodes=[];designRunning=false;document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));if(el)el.classList.add('active');else{const ni=document.querySelector(`.nav-item[data-p="${page}"]`);if(ni)ni.classList.add('active')}renderPage(page);document.getElementById('mainContent').scrollTop=0}

function U(title,desc,steps){return`<div class="story"><h4>📖 用户故事：${title}</h4><p>${desc}</p>${steps?`<div class="sr">${steps.map((s,i)=>`<span class="sn">${i+1}. ${s}</span>`).join('')}</div>`:''}</div>`}

function renderPage(page){
document.getElementById('pageTitle').textContent={'dashboard':'📊 工作台概览',design:'🎨 AI 选品设计',trends:'🔍 趋势研究',myTasks:'📋 我的选品任务',reports:'📝 选品报告',costApproval:'✅ 成本审批',material:'🧵 物料BOM管理',factory:'🏭 工厂管理',salesData:'📈 销售数据看板',review:'🔬 选品复盘',workflow:'⚙️ 工作流编排',agentMonitor:'🤖 Agent 监控',mcpConfig:'🔌 MCP 工具配置',settings:'⚙️ 系统设置',users:'👥 用户管理'}[page]||page;
document.getElementById('pagePath').textContent=roleNames[cr]+' / '+(pageNames[page]||page);
const fns={dashboard:pgDash,design:pgDesign,trends:pgTrends,myTasks:pgTasks,reports:pgReports,costApproval:pgCost, material:pgMat,factory:pgFact,salesData:pgSales,review:pgReview,workflow:pgWF,agentMonitor:pgAM, mcpConfig:pgMCP,settings:pgSet,users:pgUsers};
document.getElementById('mainContent').innerHTML=(fns[page]||(()=>'<div class="main-content"><div class="empty"><div class="icon">🚧</div>页面建设中</div></div>'))()}

// ========== PAGES ==========
function pgDash(){const d={designer:{s:[{n:24,l:'今日选品任务'},{n:18,l:'已完成方案',c:'green'},{n:78,l:'平均爆款率%',c:'orange'},{n:3,l:'待审核方案',c:'purple'}],t:['夏季牛仔短裤 · ¥28.5 · ✅完成','雪纺连衣裙 · ¥42.0 · ✅完成','工装风外套 · ¥55.0 · 🔄进行中','运动瑜伽裤 · ¥22.5 · ⏳待审核'],q:[{t:'🎨 新建选品',p:'design'},{t:'📋 查看任务',p:'myTasks'},{t:'🔍 趋势研究',p:'trends'}]},supply:{s:[{n:3,l:'待审批成本',c:'red'},{n:47,l:'本月审批数'},{n:2,l:'超预算拦截'},{n:12,l:'活跃供应商'}],t:['牛仔短裤方案 · ¥28.5 · ⏳待审批','工装外套方案 · ¥55.0 · ⏳待审批','连衣裙方案 · ¥42.0 · ✅已通过'],q:[{t:'✅ 成本审批',p:'costApproval'},{t:'🧵 物料管理',p:'material'},{t:'🏭 工厂管理',p:'factory'}]},ops:{s:[{n:'15,230',l:'热销TOP1周销量'},{n:3.2,l:'退货率%'},{n:82,l:'选品命中率%'},{n:5,l:'待复盘方案'}],t:['夏季牛仔 · 上新高14天 · 待复盘','雪纺连衣裙 · 上新高7天 · 待复盘'],q:[{t:'📈 销售看板',p:'salesData'},{t:'🔬 选品复盘',p:'review'},{t:'📝 复盘报告',p:'reports'}]},admin:{s:[{n:5,l:'活跃Agent'},{n:4,l:'MCP服务',c:'green'},{n:98.7,l:'系统可用率%',c:'green'},{n:156,l:'今日API调用'}],t:['总管Agent · 🟢运行中','趋势Agent · 🟢运行中','设计Agent · 🟡GPU排队'],q:[{t:'⚙️ 工作流编排',p:'workflow'},{t:'🔌 MCP配置',p:'mcpConfig'},{t:'🤖 Agent监控',p:'agentMonitor'}]}},v=d[cr]||d.designer;return`<div class="main-content">${U('作为'+roleNames[cr]+'，我想在登录后快速了解当前工作状态','系统展示与我角色相关的关键指标、待办任务和快捷入口，帮助我高效开展工作。',['登录系统','查看工作台指标','查看待办任务','点击快捷入口开始工作'])}<div class="stats">${v.s.map(s=>`<div class="stat"><div class="n" style="color:var(--${s.c||'blue'})">${s.n}</div><div class="l">${s.l}</div></div>`).join('')}</div><div class="grid2"><div class="card"><h4>📋 待办事项</h4>${v.t.map(t=>`<div class="ar"><div class="info"><h4 style="font-size:13px">${t}</h4></div></div>`).join('')}</div><div class="card"><h4>⚡ 快捷入口</h4><div class="btn-grp" style="flex-direction:column;gap:8px;margin-top:12px">${v.q.map(q=>`<button class="btn btn-o" style="justify-content:flex-start;text-align:left;width:100%" onclick="navTo('${q.p}')">${q.t}</button>`).join('')}</div></div></div></div>`}

function runDesign(){if(designRunning)return;designRunning=true;const btn=document.getElementById('btnDesign');btn.disabled=true;btn.textContent='⏳ Agent 执行中...';const out=document.getElementById('designOutput');const steps=['🧠 总管Agent','🔍 趋势Agent','📊 PLM数据Agent','🎨 设计Agent','💰 供应链Agent'];let html='<div class="card"><h4>🤖 Agent 协同执行</h4><div class="flow-list">';steps.forEach((s,i)=>{html+=`<div class="flow-step" id="ds${i}"><div class="num" style="background:var(--text2)">${i+1}</div><div class="info"><h4>${s}</h4><p>等待中...</p></div><span class="st st-w">等待</span></div>`});html+='</div></div>';out.innerHTML=html;(async()=>{for(let i=0;i<steps.length;i++){await new Promise(r=>setTimeout(r,500));const el=document.getElementById('ds'+i);if(el){el.querySelector('.num').style.background='var(--blue)';el.querySelector('.st').className='st st-a';el.querySelector('.st').textContent='执行中';el.querySelector('p').textContent=['解析选品需求，拆解任务...','MCP爬虫+向量RAG检索...','SQL查询热销/成本数据...','多模态模型生成效果图...','面料+加工成本核算...'][i]}}for(let i=0;i<steps.length;i++){await new Promise(r=>setTimeout(r,400));const el=document.getElementById('ds'+i);if(el){el.querySelector('.num').style.background='var(--green)';el.querySelector('.st').className='st st-d';el.querySelector('.st').textContent='✅';el.querySelector('p').textContent='执行完成'}}out.innerHTML+=`<div class="card" style="margin-top:16px"><h4>🎉 选品方案已生成</h4><p style="color:var(--text2);font-size:13px;margin:8px 0">共生成3个方案，全部在预算内。<strong>已自动提交供应链专员审核成本。</strong></p><div class="cards">${[{name:'高腰阔腿牛仔短裤',cost:28.5,rate:78,tags:['阔腿','浅蓝水洗','弹力牛仔']},{name:'A字显瘦牛仔短裤',cost:22.0,rate:72,tags:['A字','复古白','天丝牛仔']},{name:'毛边磨破牛仔短裤',cost:30.5,rate:68,tags:['磨破','炭黑','全棉牛仔']}].map(d=>`<div class="card"><h4>${d.name}</h4><div class="tags">${d.tags.map(t=>`<span class="tag tp">${t}</span>`).join('')}</div><div style="font-size:22px;font-weight:700;color:var(--green);margin:8px 0">¥${d.cost}/件</div><div style="font-size:13px;color:var(--orange)">🔥 爆款率: ${d.rate}% function addNode(name){document.getElementById('wfE').style.display='none';let t='pl';if(name.includes('趋势'))t='tr';if(name.includes('数据'))t='dt';if(name.includes('设计'))t='ds';if(name.includes('供应')||name.includes('链'))t='sp';if(name.includes('汇总'))t='sm';const n={id:Date.now(),name,type:t,x:60+(wfNodes.length%3)*200,y:40+Math.floor(wfNodes.length/3)*120};wfNodes.push(n);renderWF()}
function renderWF(){const c=document.getElementById('wfC');c.querySelectorAll('.wf-node,.wf-svg').forEach(e=>e.remove());wfNodes.forEach(n=>{const d=document.createElement('div');d.className='wf-node '+n.type;d.style.left=n.x+'px';d.style.top=n.y+'px';d.innerHTML=`<div class="nt">${n.name}</div><div class="ns">${n.type}</div>`;d.onclick=()=>showCfg(n);d.onmousedown=e=>{let ox=e.clientX-n.x,oy=e.clientY-n.y;const mv=e2=>{n.x=e2.clientX-ox;n.y=e2.clientY-oy;d.style.left=n.x+'px';d.style.top=n.y+'px'};const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);renderWF()};document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up)};c.appendChild(d)});if(wfNodes.length>1){const s=document.createElementNS('http://www.w3.org/2000/svg','svg');s.classList.add('wf-svg');s.setAttribute('width','100%');s.setAttribute('height','100%');s.style.cssText='position:absolute;top:0;left:0;pointer-events:none;z-index:1';for(let i=0;i<wfNodes.length-1;i++){const f=wfNodes[i],t=wfNodes[i+1];const l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',f.x+80);l.setAttribute('y1',f.y+38);l.setAttribute('x2',t.x+80);l.setAttribute('y2',t.y);l.setAttribute('stroke','#2563eb');l.setAttribute('stroke-width','2');l.setAttribute('stroke-dasharray','5,3');const a=document.createElementNS('http://www.w3.org/2000/svg','polygon');a.setAttribute('points','0,0 8,4 0,8');a.setAttribute('fill','#2563eb');a.setAttribute('transform',`translate(${(f.x+t.x)/2+76},${(f.y+t.y)/2+15})`);s.appendChild(l);s.appendChild(a)}c.appendChild(s)}}
function showCfg(n){document.getElementById('wfX').innerHTML=`<h4 style="color:var(--blue)">${n.name}</h4><p style="font-size:12px;color:var(--text2)">ID:${n.id}</p><div style="margin-top:12px">${[{l:'模型',v:'DeepSeek V3'},{l:'Temperature',v:'0.3'},{l:'超时',v:'60s'},{l:'重试',v:'3次'}].map(c=>`<div style="padding:6px 0;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border)">${c.l}: <strong style="color:var(--text)">${c.v}</strong></div>`).join('')}</div><button class="btn btn-r btn-s" style="margin-top:12px" onclick="wfNodes=wfNodes.filter(x=>x.id!==n.id);renderWF();if(wfNodes.length===0){document.getElementById('wfE').style.display='block';document.getElementById('wfX').innerHTML='<h4 style=font-size:14px;color:var(--blue)>⚙️ 节点配置</h4><p style=font-size:12px;color:var(--text2)>点击画布节点查看配置</p>'}else{document.getElementById('wfX').innerHTML='<h4 style=font-size:14px;color:var(--blue)>⚙️ 节点配置</h4><p style=font-size:12px;color:var(--text2)>点击画布节点查看配置</p>'}">删除节点</button>`}
function loadTmpl(name){wfNodes=[];document.getElementById('wfE').style.display='none';const m={'标准选品流程':['🧠 总管Agent','🔍 趋势Agent','📊 PLM数据Agent','🎨 设计Agent','💰 供应链Agent','📝 汇总Agent'],'快速打版流程':['🧠 总管Agent','🎨 设计Agent','📝 汇总Agent'],'成本优先流程':['🧠 总管Agent','📊 PLM数据Agent','💰 供应链Agent','📝 汇总Agent'],'爆款复盘流程':['🧠 总管Agent','📊 PLM数据Agent','📝 汇总Agent']};(m[name]||[]).forEach(a=>addNode(a))}
